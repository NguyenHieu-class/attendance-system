{% extends "base.html" %}
{% block content %}
<h1 class="h3">{{ "Edit user" if user else "New user" }}</h1>
<form method="post" action="{{ '/admin/users/' ~ user.id ~ '/edit' if user else '/admin/users' }}" class="row g-3">
  <div class="col-md-4"><label class="form-label">Employee code</label><input name="employee_code" class="form-control" value="{{ user.employee_code if user else '' }}" required></div>
  <div class="col-md-8"><label class="form-label">Full name</label><input name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required></div>
  <div class="col-md-4"><label class="form-label">Department</label><input name="department" class="form-control" value="{{ user.department if user else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Position</label><input name="position" class="form-control" value="{{ user.position if user else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Status</label><select name="status" class="form-select"><option>active</option><option>inactive</option><option>blocked</option></select></div>
  <div class="col-md-6"><label class="form-label">Email</label><input name="email" class="form-control" value="{{ user.email if user else '' }}"></div>
  <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" class="form-control" value="{{ user.phone if user else '' }}"></div>
  <div class="col-12"><button class="btn btn-primary">Save</button> <a class="btn btn-link" href="/admin/users">Cancel</a></div>
</form>
{% endblock %}
