{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3">Users</h1><a class="btn btn-primary" href="/admin/users/new">New user</a>
</div>
<table class="table table-hover">
  <tr><th>Code</th><th>Name</th><th>Department</th><th>Status</th><th></th></tr>
  {% for user in users %}
  <tr>
    <td>{{ user.employee_code }}</td><td>{{ user.full_name }}</td><td>{{ user.department or "" }}</td><td>{{ user.status }}</td>
    <td class="text-end">
      <a class="btn btn-sm btn-outline-secondary" href="/admin/users/{{ user.id }}">Edit</a>
      <a class="btn btn-sm btn-outline-primary" href="/admin/users/{{ user.id }}/faces">Face/NFC</a>
      <form method="post" action="/admin/users/{{ user.id }}/disable" class="d-inline"><button class="btn btn-sm btn-outline-warning">Disable</button></form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
