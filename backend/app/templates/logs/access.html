{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between"><h1 class="h3">Access logs</h1><a class="btn btn-outline-secondary" href="/admin/export/access_logs.csv">Export CSV</a></div>
<table class="table table-sm"><tr><th>ID</th><th>Door</th><th>User</th><th>Method</th><th>Result</th><th>Reason</th><th>Time</th></tr>
{% for log in logs %}<tr><td>{{ log.id }}</td><td>{{ log.door_id }}</td><td>{{ log.user_id or "" }}</td><td>{{ log.method }}</td><td>{{ log.result }}</td><td>{{ log.reason }}</td><td>{{ log.created_at }}</td></tr>{% endfor %}
</table>
{% endblock %}
