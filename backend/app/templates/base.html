<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Attendance Admin" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/admin">Attendance</a>
    {% if admin %}
    <div class="navbar-nav">
      <a class="nav-link" href="/admin/users">Users</a>
      <a class="nav-link" href="/admin/doors">Doors</a>
      <a class="nav-link" href="/admin/camera">Camera</a>
      <a class="nav-link" href="/admin/attendance">Attendance</a>
      <a class="nav-link" href="/admin/access-logs">Access logs</a>
    </div>
    <form class="ms-auto" method="post" action="/logout"><button class="btn btn-outline-light btn-sm">Logout</button></form>
    {% endif %}
  </div>
</nav>
<main class="container py-4">
  {% block content %}{% endblock %}
</main>
</body>
</html>
