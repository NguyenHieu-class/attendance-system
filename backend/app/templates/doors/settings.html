{% extends "base.html" %}
{% block content %}
<h1 class="h3">Door settings: {{ setting.door_id }}</h1>
<form method="post" class="row g-3">
  <div class="col-md-4"><label class="form-label">Access mode</label><select name="access_mode" class="form-select">
    {% for mode in ["face_only","nfc_only","face_or_nfc","face_and_nfc","admin_only","disabled"] %}
    <option value="{{ mode }}" {% if setting.access_mode == mode %}selected{% endif %}>{{ mode }}</option>
    {% endfor %}
  </select></div>
  <div class="col-md-4"><label class="form-label">Unlock duration ms</label><input name="unlock_duration_ms" type="number" class="form-control" value="{{ setting.unlock_duration_ms }}"></div>
  <div class="col-md-4"><label class="form-label">Face threshold</label><input name="face_threshold" type="number" step="0.01" class="form-control" value="{{ setting.face_threshold }}"></div>
  <div class="col-12 form-check ms-2"><input name="physical_button_enabled" class="form-check-input" type="checkbox" {% if setting.physical_button_enabled %}checked{% endif %}><label class="form-check-label">Physical button enabled</label></div>
  <div class="col-12"><hr><h2 class="h5">Liveness Detection</h2></div>
  <div class="col-md-4 form-check ms-2">
    <input name="liveness_enabled" class="form-check-input" type="checkbox" {% if setting.liveness_enabled %}checked{% endif %}>
    <label class="form-check-label">Enable passive liveness detection</label>
  </div>
  <div class="col-md-4">
    <label class="form-label">Liveness threshold</label>
    <input name="liveness_threshold" type="number" min="0.1" max="0.99" step="0.01" class="form-control" value="{{ setting.liveness_threshold }}">
  </div>
  <div class="col-md-4 form-check ms-2">
    <input name="liveness_fail_closed" class="form-check-input" type="checkbox" {% if setting.liveness_fail_closed %}checked{% endif %}>
    <label class="form-check-label">Fail closed when model is unavailable</label>
  </div>
  <div class="col-12"><button class="btn btn-primary">Save</button></div>
</form>
{% endblock %}
